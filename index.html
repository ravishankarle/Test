
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Profile Card</title>

<!-- Bootstrap 5 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="style.css">
</head>

<body class="light-mode">

<div class="container d-flex justify-content-center align-items-center min-vh-100">

    <div class="flip-card">
        <div class="flip-card-inner">

            <!-- FRONT SIDE -->
            <div class="flip-card-front card text-center p-4 shadow-lg">

                <img src="image/image3.jpeg" class="rounded-circle mb-3 d-block mx-auto" width="120">

                <h3>Ravishankar Kumar</h3>
                <p class="text-muted">MCA Student</p>

                <!-- Social Icons -->
                <div class="social-icons mb-3">
                    <a href="#"><i class="fab fa-github"></i></a>
                    <a href="#"><i class="fab fa-linkedin"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                </div>

                <button class="btn btn-primary w-100">View More</button>
            </div>

            <!-- BACK SIDE -->
            <div class="flip-card-back card text-center p-4 shadow-lg">
                <h4>About Me</h4>
                <p>I am an MCA student passionate about web development and modern technologies.
I love building creative, efficient, and user-friendly applications.</p>

                <button class="btn btn-warning w-100 mt-3" onclick="toggleMode()"> Dark/Light</button>
                <button onclick="showMessage()" class='btn btn-success w-100'>Contact Me</button>
            </div>

        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
